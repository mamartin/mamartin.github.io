<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <title>Gesto vlevo / vpravo</title>
    <style>
      body {
        margin: 0;
        background: black;
        color: white;
        text-align: center;
      }
      video,
      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }
      #result {
        position: absolute;
        bottom: 20px;
        width: 100%;
        font-size: 40px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="result">čekám na ruku...</div>
    <div
      id="arrow"
      style="position: absolute; bottom: 80px; width: 100%; font-size: 80px"
    >
      ⬆️
    </div>

    <script type="module">
      import "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js";
      import "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js";

      const video = document.getElementById("video");
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert(
          "Vaše prostředí nepodporuje přístup ke kameře. Otevřete stránku v Chrome nebo Firefox na localhost nebo přes HTTPS.",
        );
        throw new Error("getUserMedia is not supported");
      }
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const resultEl = document.getElementById("result");
      const arrowEl = document.getElementById("arrow");

      // jednoduchá fyzika kuliček
      const balls = [];
      const gravity = 0.5;

      function spawnBall() {
        balls.push({
          x: Math.random() * canvas.width,
          y: -20,
          vx: (Math.random() - 0.5) * 4,
          vy: 0,
          r: 10 + Math.random() * 10,
        });
      }

      setInterval(spawnBall, 800);

      // inicializace MediaPipe
      const hands = new window.Hands({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });

      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7,
      });

      // hlavní logika
      hands.onResults((results) => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // vykreslení videa se zrcadlením
        ctx.save();
        ctx.scale(-1, 1); // horizontální zrcadlení
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        // částečné vyblednutí staré stopy ruky
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; // menší alfa, aby stopa pomalu mizela
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // vykreslení ruky a sběr bodů pro kolize
        let handPoints = [];
        if (results.multiHandLandmarks.length > 0) {
          results.multiHandLandmarks.forEach((landmarks) => {
            for (let i = 0; i < landmarks.length; i++) {
              const x = (1 - landmarks[i].x) * canvas.width;
              const y = landmarks[i].y * canvas.height;

              // stopa ruky
              ctx.beginPath();
              ctx.arc(x, y, 8, 0, 2 * Math.PI);
              ctx.fillStyle = "rgba(0,255,0,0.5)";
              ctx.fill();

              handPoints.push({ x, y });
            }
          });
        }

        // update kuliček
        balls.forEach((b) => {
          b.vy += gravity;
          b.x += b.vx;
          b.y += b.vy;

          // kolize s rukou
          handPoints.forEach((p) => {
            const dx = b.x - p.x;
            const dy = b.y - p.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < b.r + 20) {
              b.vy = -Math.abs(b.vy) * 0.8;
              b.vx += dx * 0.05;
            }
          });

          // spodní okraj
          if (b.y > canvas.height - b.r) {
            b.y = canvas.height - b.r;
            b.vy *= -0.7;
          }

          // kreslení kuličky
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fillStyle = "red";
          ctx.fill();
        });

        // směr palce pro šipku
        if (results.multiHandLandmarks.length > 0) {
          const landmarks = results.multiHandLandmarks[0];
          const thumbTip = { x: 1 - landmarks[4].x, y: landmarks[4].y };
          const indexBase = { x: 1 - landmarks[5].x, y: landmarks[5].y };
          const dx = thumbTip.x - indexBase.x;
          const dy = thumbTip.y - indexBase.y;
          const angle = Math.atan2(dy, dx);
          const deg = (angle * 180) / Math.PI;
          resultEl.innerText = `úhel: ${deg.toFixed(1)}°`;
          arrowEl.style.transform = `rotate(${deg + 90}deg)`;
        } else {
          resultEl.innerText = "nevidím ruku";
          arrowEl.style.transform = "rotate(0deg)";
        }

        // omezení počtu kuliček
        while (balls.length > 50) balls.shift();
      });

      // kamera
      const camera = new window.Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
        },
        width: 640,
        height: 480,
      });

      camera.start();
    </script>
  </body>
</html>
